name: Supabase Notification Cron

on:
  schedule:
    - cron: '0 9,14,20 * * *'  # 9:00, 14:00, 20:00 UTC
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -X POST "https://kadxijqeylpfayayqhxq.supabase.co/functions/v1/dispatch-plant-reminders" \
            -H "x-cron-secret: ${{ secrets.SUPABASE_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}'